name: Auto Deploy Live (cPanel SSH)

on:
  workflow_dispatch:

concurrency:
  group: live-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required SSH secrets
        id: precheck
        shell: bash
        env:
          LIVE_HOST: ${{ secrets.LIVE_HOST }}
          LIVE_USER: ${{ secrets.LIVE_USER }}
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_APP_PATH: ${{ secrets.LIVE_APP_PATH }}
        run: |
          missing=()
          for v in LIVE_HOST LIVE_USER LIVE_SSH_KEY LIVE_APP_PATH; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "Missing required secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy latest code on live server
        if: ${{ steps.precheck.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIVE_HOST }}
          username: ${{ secrets.LIVE_USER }}
          key: ${{ secrets.LIVE_SSH_KEY }}
          port: ${{ secrets.LIVE_PORT }}
          script_stop: true
          script: |
            set -e

            APP_PATH="${{ secrets.LIVE_APP_PATH }}"
            BRANCH="${{ secrets.LIVE_BRANCH }}"
            if [ -z "$BRANCH" ]; then BRANCH="main"; fi

            if [ -z "$APP_PATH" ]; then
              echo "LIVE_APP_PATH secret is missing."
              exit 1
            fi

            cd "$APP_PATH"

            if [ ! -d ".git" ]; then
              echo "No git repository found at $APP_PATH."
              echo "Clone your GitHub repo there one time first."
              exit 1
            fi

            BACKUP_DIR="$APP_PATH/.deploy-backup"
            rm -rf "$BACKUP_DIR"
            mkdir -p "$BACKUP_DIR"

            mkdir -p "$BACKUP_DIR/data"
            for file in .env data/permissions.json data/date_sheet.json data/admin_credentials.json; do
              if [ -f "$file" ]; then
                mkdir -p "$BACKUP_DIR/$(dirname "$file")"
                cp "$file" "$BACKUP_DIR/$file"
              fi
            done

            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            for file in .env data/permissions.json data/date_sheet.json data/admin_credentials.json; do
              if [ -f "$BACKUP_DIR/$file" ]; then
                mkdir -p "$(dirname "$file")"
                cp "$BACKUP_DIR/$file" "$file"
              fi
            done

            if [ -f "package-lock.json" ]; then
              npm ci --omit=dev
            else
              npm install --omit=dev
            fi

            mkdir -p tmp
            touch tmp/restart.txt

            echo "Live deployment completed."

      - name: Skip deploy (missing required secrets)
        if: ${{ steps.precheck.outputs.ready != 'true' }}
        run: |
          echo "Skipping live deploy. Missing secrets: ${{ steps.precheck.outputs.missing }}"
